<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Multi-Agent Business Intelligence System</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Pulse glow animation */
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            }
            50% {
                box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
            }
        }
        .glow-card {
            animation: pulse-glow 3s infinite;
        }
        
        /* Custom typography settings for AI generated reports */
        .prose h1, .prose h2, .prose h3, .prose h4 {
            color: #f8fafc !important;
            font-weight: 700 !important;
            margin-top: 1.25rem !important;
            margin-bottom: 0.5rem !important;
            font-family: 'Outfit', sans-serif !important;
        }
        .prose h1 { font-size: 1.35rem !important; }
        .prose h2 { font-size: 1.15rem !important; border-bottom: 1px solid #334155; padding-bottom: 0.25rem; }
        .prose h3 { font-size: 1.05rem !important; color: #818cf8 !important; }
        .prose p, .prose li {
            color: inherit !important;
            line-height: 1.6 !important;
            font-size: 0.85rem !important;
            margin-top: 0.35rem !important;
            margin-bottom: 0.35rem !important;
            font-family: 'Outfit', sans-serif !important;
        }
        .prose ul, .prose ol {
            margin-top: 0.35rem !important;
            margin-bottom: 0.35rem !important;
            padding-left: 1.1rem !important;
        }
        .prose li {
            list-style-type: disc !important;
        }
        .prose strong {
            color: #f1f5f9 !important;
            font-weight: 600 !important;
        }
        /* Light theme color and layout overrides */
        .theme-light .bg-slate-950/40, 
        .theme-light .bg-slate-900/40, 
        .theme-light .bg-slate-900,
        .theme-light .bg-slate-950,
        .theme-light .bg-slate-900/35 {
            background-color: #ffffff !important;
        }
        .theme-light .border-slate-800, 
        .theme-light .border-slate-850,
        .theme-light .border-slate-700,
        .theme-light .border-slate-700/50,
        .theme-light .divide-slate-850 > :not([hidden]) ~ :not([hidden]) {
            border-color: #e2e8f0 !important;
        }
        .theme-light .text-white, 
        .theme-light .text-slate-100,
        .theme-light .text-slate-200 {
            color: #0f172a !important;
        }
        .theme-light .text-slate-300, 
        .theme-light .text-slate-400 {
            color: #475569 !important;
        }
        .theme-light .bg-slate-950/20,
        .theme-light .bg-slate-900/20,
        .theme-light .bg-slate-905/30 {
            background-color: #f1f5f9 !important;
        }
        .theme-light .bg-slate-950/60 {
            background-color: #ffffff !important;
        }
        .theme-light .bg-slate-800,
        .theme-light .bg-slate-800/80,
        .theme-light .bg-slate-800/50 {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
        }
        .theme-light .text-indigo-400,
        .theme-light .text-indigo-300 {
            color: #4f46e5 !important;
        }
        .theme-light .text-slate-500 {
            color: #64748b !important;
        }
        .theme-light .hover:bg-slate-800/60:hover {
            background-color: #e2e8f0 !important;
        }
        .theme-light .hover:text-slate-200:hover {
            color: #0f172a !important;
        }
        .theme-light .prose h1, .theme-light .prose h2, .theme-light .prose h3, .theme-light .prose h4 {
            color: #0f172a !important;
        }
        .theme-light .prose strong {
            color: #0f172a !important;
        }

        /* Executive PDF Print Styles */
        @media print {
            body, html {
                background: #ffffff !important;
                color: #0f172a !important;
            }
            /* Hide non-executive layout components */
            aside, header, button, select, input, .no-print, .feedback-modal, form, .bg-indigo-500\/10 {
                display: none !important;
            }
            /* Reset main panel layout margins */
            main {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                background: #ffffff !important;
            }
            .min-h-screen, .flex-grow {
                min-h-screen: 0 !important;
                height: auto !important;
                display: block !important;
            }
            /* Expand cards to look clean on white paper */
            .bg-slate-900\/40, .bg-slate-900, .bg-slate-950\/20 {
                background: #ffffff !important;
                color: #0f172a !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                margin-bottom: 1.5rem !important;
                page-break-inside: avoid !important;
            }
            /* Text adjustments */
            h1, h2, h3, h4, span, p, td, th {
                color: #0f172a !important;
            }
            .text-indigo-400, .text-indigo-300, .text-emerald-450 {
                color: #4f46e5 !important;
                font-weight: bold !important;
            }
            .prose {
                max-width: none !important;
                color: #0f172a !important;
            }
            .prose h1, .prose h2, .prose h3 {
                color: #0f172a !important;
                border-bottom-color: #cbd5e1 !important;
                page-break-after: avoid !important;
            }
            /* Chart adjustments to prevent clipping */
            canvas, .chart-container {
                page-break-inside: avoid !important;
                max-width: 100% !important;
                height: 300px !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-950 to-indigo-950 text-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ErrorBoundary component to catch rendering errors and display diagnostic stack trace
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error:", error, errorInfo);
                this.setState({ error, errorInfo });
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-rose-950/45 border border-rose-500/30 rounded-3xl max-w-2xl mx-auto mt-10 space-y-4 text-slate-200">
                            <h2 className="text-xl font-bold text-rose-450 flex items-center space-x-2">
                                <span className="text-rose-500">⚠</span>
                                <span>Something went wrong in the UI</span>
                            </h2>
                            <p className="text-sm text-slate-300">The React component tree crashed. Here is the error detail:</p>
                            <pre className="p-4 bg-slate-950/80 rounded-xl text-xs text-rose-300 font-mono overflow-auto max-h-60 leading-normal whitespace-pre-wrap">
                                {this.state.error && this.state.error.toString()}
                                {"\n\nComponent Stack:\n"}
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>
                            <button 
                                onClick={() => window.location.reload()}
                                className="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-xs font-semibold transition"
                            >
                                Reload Page
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Header component
        function Header({ status, onRefresh }) {
            return (
                <header className="flex justify-between items-center py-4 px-6 border-b border-slate-800 bg-slate-950/40 backdrop-blur-md sticky top-0 z-50">
                    <div className="flex items-center space-x-3">
                        <div className="p-2 bg-indigo-600/20 border border-indigo-500/30 rounded-xl text-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                            <i data-lucide="cpu" className="w-6 h-6"></i>
                        </div>
                        <div>
                            <h1 className="text-xl font-bold tracking-tight text-white flex items-center">
                                Enterprise BI <span className="text-indigo-400 ml-2 font-medium text-sm px-2 py-0.5 bg-indigo-500/10 border border-indigo-500/20 rounded-md">Multi-Agent AI</span>
                            </h1>
                            <p className="text-xs text-slate-400">Autonomous Multi-Agent Business Intelligence</p>
                        </div>
                    </div>
                    
                    <div className="flex items-center space-x-4">
                        <div className="flex items-center space-x-2 text-sm bg-slate-900/60 border border-slate-800 py-1.5 px-3 rounded-lg">
                            <span className={`w-2.5 h-2.5 rounded-full ${status.dataset_loaded ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></span>
                            <span className="text-xs text-slate-300">
                                {status.dataset_loaded ? `Dataset: ${status.dataset_name}` : 'No Dataset Loaded'}
                            </span>
                        </div>
                        
                        <button 
                            onClick={onRefresh}
                            className="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 hover:border-slate-600 rounded-lg transition"
                            title="Refresh System Status"
                        >
                            <i data-lucide="rotate-cw" className="w-4 h-4"></i>
                        </button>
                    </div>
                </header>
            );
        }        // Sidebar Navigation
        function Sidebar({ activeTab, setActiveTab, hasDataset, user, onLogout, onFeedbackOpen, theme }) {
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'bar-chart-3', disabled: !hasDataset },
                { id: 'rootcause', label: 'Root Cause & Forecast', icon: 'trending-up', disabled: !hasDataset },
                { id: 'recommendations', label: 'Strategic Plan', icon: 'clipboard-list', disabled: !hasDataset },
                { id: 'chat', label: 'AI Knowledge Chat', icon: 'message-square', disabled: !hasDataset },
                { id: 'upload', label: 'Upload Data', icon: 'upload', disabled: false },
                { id: 'settings', label: 'Settings', icon: 'settings', disabled: false },
            ];

            return (
                <aside className="w-64 bg-slate-950/40 border-r border-slate-800/80 p-4 flex flex-col justify-between">
                    <div className="space-y-6">
                        <div className="px-3">
                            <p className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Navigation</p>
                        </div>
                        <nav className="space-y-1.5">
                            {navItems.map((item) => {
                                const isActive = activeTab === item.id;
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => !item.disabled && setActiveTab(item.id)}
                                        disabled={item.disabled}
                                        className={`w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition duration-200 ${
                                            isActive
                                                ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20'
                                                : item.disabled
                                                    ? 'opacity-40 cursor-not-allowed text-slate-500'
                                                    : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200'
                                        }`}
                                    >
                                        {item.icon === 'bar-chart-3' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path>
                                            </svg>
                                        )}
                                        {item.icon === 'trending-up' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>
                                            </svg>
                                        )}
                                        {item.icon === 'clipboard-list' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                                                <line x1="8" y1="11" x2="8" y2="11"></line><line x1="8" y1="16" x2="8" y2="16"></line>
                                                <line x1="12" y1="11" x2="16" y2="11"></line><line x1="12" y1="16" x2="16" y2="16"></line>
                                            </svg>
                                        )}
                                        {item.icon === 'message-square' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                            </svg>
                                        )}
                                        {item.icon === 'upload' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>
                                            </svg>
                                        )}
                                        {item.icon === 'settings' && (
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <circle cx="12" cy="12" r="3"></circle>
                                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                            </svg>
                                        )}
                                        <span>{item.label}</span>
                                    </button>
                                );
                            })}
                        </nav>
                        
                        <div className="px-3 pt-2">
                            <button
                                onClick={onFeedbackOpen}
                                className="w-full flex items-center space-x-3 px-3 py-2 border border-slate-850 hover:border-slate-700 bg-slate-905/30 text-indigo-400 hover:text-indigo-300 rounded-xl text-xs font-semibold tracking-wide transition duration-150"
                            >
                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span>Share Feedback</span>
                            </button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {user && (
                            <div className="p-3 bg-slate-900/35 border border-slate-850 rounded-xl space-y-3">
                                <div className="flex items-center space-x-2.5">
                                    <div className="w-7 h-7 rounded-full bg-indigo-600/30 border border-indigo-500/30 flex items-center justify-center text-[10px] font-bold text-indigo-300">
                                        ADM
                                    </div>
                                    <div className="overflow-hidden">
                                        <p className="text-[11px] font-bold text-slate-200 truncate">{user.email}</p>
                                        <p className="text-[9px] text-slate-500 truncate">Administrator</p>
                                    </div>
                                </div>
                                <button
                                    onClick={onLogout}
                                    className="w-full flex items-center justify-center space-x-1.5 py-1.5 bg-slate-950 hover:bg-slate-900 border border-slate-850 hover:border-slate-750 text-[10px] font-semibold text-rose-455 hover:text-rose-400 rounded-lg transition"
                                >
                                    <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                        <polyline points="16 17 21 12 16 7"></polyline>
                                        <line x1="21" y1="12" x2="9" y2="12"></line>
                                    </svg>
                                    <span>Logout Session</span>
                                </button>
                            </div>
                        )}
                        
                        <div className="p-3 bg-slate-900/60 border border-slate-800 rounded-xl space-y-2">
                            <div className="flex items-center space-x-2 text-xs font-semibold text-indigo-400">
                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                </svg>
                                <span>Agent System</span>
                            </div>
                            <p className="text-[10px] text-slate-400 leading-normal font-medium">
                                Proprietary Decision Support System.
                            </p>
                        </div>
                    </div>
                </aside>
            );
        }

        // KPI Card Component
        function KPICard({ title, value, icon, percentage, isMargin = false }) {
            return (
                <div className="bg-slate-900/40 backdrop-blur-sm border border-slate-800 p-5 rounded-2xl flex justify-between items-start hover:border-slate-700/60 transition shadow-sm hover:shadow-md">
                    <div className="space-y-2">
                        <p className="text-xs font-medium text-slate-400 uppercase tracking-wider">{title}</p>
                        <h3 className="text-2xl font-bold text-white tracking-tight">{value}</h3>
                        {percentage !== undefined && (
                            <p className={`text-xs ${percentage >= 0 ? 'text-emerald-400' : 'text-rose-400'} flex items-center space-x-1`}>
                                <i data-lucide={percentage >= 0 ? "trending-up" : "trending-down"} className="w-3 h-3"></i>
                                <span>{percentage >= 0 ? '+' : ''}{percentage.toFixed(1)}% vs. benchmark</span>
                            </p>
                        )}
                    </div>
                    <div className="p-3 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-300">
                        <i data-lucide={icon} className="w-5 h-5"></i>
                    </div>
                </div>
            );
        }

        // Charts Section
        function CategorySalesChart({ data, theme }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data) return;

                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                const isLight = theme === 'light';
                const textColor = isLight ? '#0f172a' : '#f8fafc';
                const mutedColor = isLight ? '#475569' : '#94a3b8';
                const gridColor = isLight ? 'rgba(15, 23, 42, 0.05)' : 'rgba(148, 163, 184, 0.05)';

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(x => x.category),
                        datasets: [
                            {
                                label: 'Sales ($)',
                                data: data.map(x => x.sales),
                                backgroundColor: isLight ? 'rgba(79, 70, 229, 0.75)' : 'rgba(99, 102, 241, 0.65)',
                                borderColor: isLight ? 'rgb(79, 70, 229)' : 'rgb(99, 102, 241)',
                                borderWidth: 1,
                                borderRadius: 6
                            },
                            {
                                label: 'Profit ($)',
                                data: data.map(x => x.profit),
                                backgroundColor: 'rgba(16, 185, 129, 0.65)',
                                borderColor: 'rgb(16, 185, 129)',
                                borderWidth: 1,
                                borderRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: textColor, font: { family: 'Outfit' } } }
                        },
                        scales: {
                            y: {
                                ticks: { color: mutedColor },
                                grid: { color: gridColor }
                            },
                            x: {
                                ticks: { color: mutedColor },
                                grid: { display: false }
                            }
                        }
                    }
                });

                return () => chartRef.current && chartRef.current.destroy();
            }, [data, theme]);

            return (
                <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-2xl space-y-4">
                    <h4 className="text-sm font-semibold text-slate-300">Category Sales & Profit Breakdown</h4>
                    <div className="h-64 relative">
                        <canvas ref={canvasRef}></canvas>
                    </div>
                </div>
            );
        }

        function RegionalProfitChart({ data, theme }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data) return;

                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                const isLight = theme === 'light';
                const textColor = isLight ? '#0f172a' : '#f8fafc';

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.map(x => x.region),
                        datasets: [{
                            data: data.map(x => Math.max(0, x.profit)), // Filter negative for doughnut visualization

        // Custom chart for Sales History & Forecast
        function ForecastChart({ data, theme }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data) return;

                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                const isLight = theme === 'light';
                const textColor = isLight ? '#0f172a' : '#f8fafc';
                const mutedColor = isLight ? '#475569' : '#94a3b8';
                const gridColor = isLight ? 'rgba(15, 23, 42, 0.05)' : 'rgba(148, 163, 184, 0.05)';

                const ctx = canvasRef.current.getContext('2d');
                
                // Combine history and predictions
                const histLabels = data.history.map(x => x.date);
                const predLabels = data.predictions.map(x => x.date);
                const allLabels = [...histLabels, ...predLabels];
                
                const histSales = data.history.map(x => x.sales);
                // Align predictions: fill empty for history points
                const predSales = [...Array(histSales.length).fill(null), ...data.predictions.map(x => x.forecast)];
                
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: allLabels,
                        datasets: [
                            {
                                label: 'Historical Sales ($)',
                                data: [...histSales, ...Array(predLabels.length).fill(null)],
                                borderColor: isLight ? 'rgb(37, 99, 235)' : 'rgb(59, 130, 246)',
                                backgroundColor: isLight ? 'rgba(37, 99, 235, 0.08)' : 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.3,
                                borderWidth: 2
                            },
                            {
                                label: 'Projected Forecast ($)',
                                data: predSales,
                                borderColor: 'rgb(139, 92, 246)',
                                borderDash: [6, 4],
                                backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                fill: true,
                                tension: 0.3,
                                borderWidth: 2,
                                pointBackgroundColor: 'rgb(139, 92, 246)'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: textColor, font: { family: 'Outfit' } } }
                        },
                        scales: {
                            y: {
                                ticks: { color: mutedColor },
                                grid: { color: gridColor }
                            },
                            x: {
                                ticks: { color: mutedColor },
                                grid: { display: false }
                            }
                        }
                    }
                });

                return () => chartRef.current && chartRef.current.destroy();
            }, [data, theme]);

            return (

        // Chat View
        function ChatView() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I am your BI Assistant. Ask me anything about the uploaded dataset, and I will retrieve relevant facts from the knowledge base to answer your questions.' }
            ]);
            const [loading, setLoading] = useState(false);
            const [references, setReferences] = useState([]);
            const [showReferences, setShowReferences] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
                if (window.lucide) window.lucide.createIcons();
            }, [messages]);

            const triggerPromptChip = (text) => {
                setInput(text);
            };

            const handleSend = async (e) => {
                if (e) e.preventDefault();
                if (!input.trim() || loading) return;

                const userMsg = input;
                setInput("");
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setLoading(true);
                setReferences([]);

                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            question: userMsg,
                            history: messages.slice(1).map(m => ({ role: m.role, content: m.content })) // exclude initial greeting
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Server error.");
                    }

                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.answer }]);
                    if (data.references) {
                        setReferences(data.references);
                    }
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${err.message}` }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-[calc(100vh-8rem)] space-y-4">
                    <div className="flex justify-between items-center">

        // Main App Layout
        function App() {
            const [user, setUser] = useState(() => {
                try {
                    const cached = localStorage.getItem("bi_user");
                    return cached ? JSON.parse(cached) : null;
                } catch {
                    return null;
                }
            });
            const [currentView, setCurrentView] = useState(() => {
                try {
                    const cached = localStorage.getItem("bi_user");
                    return cached ? 'app' : 'landing';
                } catch {
                    return 'landing';
                }
            });
            const [feedbackOpen, setFeedbackOpen] = useState(false);
            const [theme, setTheme] = useState(() => localStorage.getItem("bi_theme") || "dark");

            // Apply theme changes to document.body dynamically
            useEffect(() => {

                    document.body.classList.add('bg-slate-50', 'text-slate-900');
                } else {
                    document.body.classList.remove('theme-light', 'bg-slate-50', 'text-slate-900');
                    document.body.classList.add('bg-gradient-to-br', 'from-slate-900', 'via-slate-950', 'to-indigo-950', 'text-slate-100');

            }, [theme]);
            const [loadingWorkflow, setLoadingWorkflow] = useState(false);
            const [workflowData, setWorkflowData] = useState(null);
            const [pipelineStatus, setPipelineStatus] = useState("idle"); // idle, running, completed, error

            const refreshStatus = async () => {
                try {
                    const res = await fetch("/api/status");
                    const data = await res.json();
                    setStatus(data);
                    if (data.dataset_loaded && activeTab === 'upload') {
                        setActiveTab('dashboard');
                    }
                } catch (e) {
                    console.error("Failed to read status: ", e);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem("bi_user");
                setUser(null);
                setCurrentView('landing');
            };

            const handleLoginSuccess = (userData) => {
                localStorage.setItem("bi_user", JSON.stringify(userData));
                setUser(userData);
                setCurrentView('app');
            };

            useEffect(() => {
                refreshStatus();
            }, []);

            useEffect(() => {
                // Initialize Lucide icons on tab switch
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, status, workflowData, pipelineStatus, currentView]);

            const triggerWorkflow = async () => {
                setLoadingWorkflow(true);
                setPipelineStatus("running");
                try {
                    const res = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ question: "Evaluate entire business metrics, root causes of losses, and forecast future revenue." })
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || "Multi-agent orchestrator execution failed.");
                    }
                    const data = await res.json();
                    setWorkflowData(data);
                    setPipelineStatus("completed");
                } catch (e) {
                    console.error("Workflow failed: ", e);
                    setPipelineStatus("error");
                } finally {
                    setLoadingWorkflow(false);
                }
            };

            const handleUploadSuccess = () => {
                refreshStatus();
            };

            if (currentView === 'landing') {
                return <LandingView onAccess={() => setCurrentView('login')} />;
            }

            if (currentView === 'login') {
                return <LoginView onLoginSuccess={handleLoginSuccess} onBack={() => setCurrentView('landing')} />;

            return (

                    <Header status={status} onRefresh={refreshStatus} />
                    
                    <div className="flex-grow flex">

                            activeTab={activeTab}

                                                                </svg>
                                                                <span>AI Forecast Explanation</span>
                                                            </h4>
                                                            <div className="prose prose-invert prose-sm leading-relaxed text-slate-300 max-h-64 overflow-y-auto mt-3">
                                                                <div dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parse(workflowData.explanation_results) : workflowData.explanation_results }} />
                                                            </div>
                                                        </div>
                                                        
                                                        {/* Preview image link */}
                                                        <div className="pt-3 border-t border-slate-850">
                                                            <a 
                                                                href="/static/forecast.png" 
                                                                target="_blank" 
                                                                className="text-xs text-indigo-400 hover:text-indigo-300 font-semibold flex items-center space-x-1.5"
                                                            >
                                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                                                    <polyline points="15 3 21 3 21 9"></polyline>
                                                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                                                </svg>
                                                                <span>View Full Resolution Forecast Chart</span>
                                                            </a>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    )}
                                </div>
                            )}

                            {activeTab === 'recommendations' && status.dataset_loaded && (
                                <RecommendationsView recommendations={workflowData?.recommendation_results} />
                            )}

                            {activeTab === 'chat' && status.dataset_loaded && (
                                <ChatView />
                            )}

                            {activeTab === 'settings' && (
                                <SettingsView theme={theme} setTheme={setTheme} />
                            )}
                        </main>
                    </div>
                    
                    <FeedbackModal isOpen={feedbackOpen} onClose={() => setFeedbackOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
